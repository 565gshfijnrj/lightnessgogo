<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>房況管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; font-family: 'Noto Sans TC', sans-serif; }

body {
    margin: 0;
    background: linear-gradient(135deg,#667eea,#764ba2);
    padding: 30px;
}

.container {
    background: white;
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

.room-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-top: 20px;
}

.room-card {
    padding: 20px;
    border-radius: 15px;
    background: #f3f4f6;
    cursor: pointer;
    transition: 0.3s;
    min-height: 120px;
}

.room-card:hover { transform: translateY(-5px); }

.booked { background: #f6c453; color: white; }
.checkedin { background: #43e97b; color: white; }
.checkedout { background: #555; color: white; }

.room-number {
    font-size: 13px;
    opacity: 0.8;
}

.guest-name {
    font-size: 20px;
    font-weight: bold;
    margin-top: 5px;
}

.sub-info {
    font-size: 12px;
    margin-top: 5px;
}

.modal {
    display: none;
    position: fixed;
    top: 5%;
    left: 50%;
    transform: translateX(-50%);
    width: 450px;
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    max-height: 90vh;
    overflow-y: auto;
}

input, textarea {
    width: 100%;
    margin-bottom: 8px;
    padding: 6px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 6px 12px;
    margin-right: 5px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="container">
<h2>🏨 住房資料</h2>
選擇日期：
<input type="date" id="selectedDate">
<div class="room-grid" id="roomGrid"></div>
</div>

<div class="modal" id="formModal">
<h3 id="modalTitle"></h3>

訂單編號
<input id="orderNumber">

客人姓名
<input id="name">

電話
<input id="phone">

入住人數
<input id="people" type="number">

訂單日期
<input id="orderDate" type="date">

總金額
<input id="total" type="number">

訂金
<input id="deposit" type="number">

餘額
<input id="balance" type="number" readonly>

國家
<input id="country">

需求
<textarea id="request"></textarea>

<br>
<button onclick="save()">儲存</button>
<button onclick="setStatus('checkedin')">入住</button>
<button onclick="setStatus('checkedout')">退房</button>
<button onclick="closeModal()">關閉</button>
<button onclick="deleteBooking()" style="background:#e74c3c;color:white;">
取消訂單
</button>
</div>

<script>
const rooms = ["201","202","203","301","302","303","401","402","403"];
let bookings = {};
let currentRoom = "";

const grid = document.getElementById("roomGrid");

rooms.forEach(room=>{
    const card = document.createElement("div");
    card.className="room-card";
    card.innerHTML=`
        <div class="room-number">房號 ${room}</div>
        <div class="guest-name"></div>
        <div class="sub-info"></div>
    `;
    card.onclick=()=>openModal(room);
    grid.appendChild(card);
});

deposit.addEventListener("input",calcBalance);
total.addEventListener("input",calcBalance);

function calcBalance(){
    balance.value = (Number(total.value)||0)-(Number(deposit.value)||0);
}

function openModal(room){
    if(!selectedDate.value){ alert("請先選日期"); return; }

    currentRoom=room;
    modalTitle.innerText=room+" 房 - "+selectedDate.value;
    formModal.style.display="block";

    const data = bookings[selectedDate.value]?.[room];
    if(data){
        orderNumber.value=data.orderNumber;
        name.value=data.name;
        phone.value=data.phone;
        people.value=data.people;
        orderDate.value=data.orderDate;
        total.value=data.total;
        deposit.value=data.deposit;
        balance.value=data.balance;
        country.value=data.country;
        request.value=data.request;
    }else{
        document.querySelectorAll("#formModal input, #formModal textarea")
        .forEach(i=>i.value="");
    }
}

function closeModal(){
    formModal.style.display="none";
}

function save(){

    const date = document.getElementById("selectedDate").value;

    if(!bookings[date]) bookings[date] = {};

    const nameValue = document.getElementById("name").value.trim();
    const orderNumberValue = document.getElementById("orderNumber").value.trim();

    bookings[date][currentRoom] = {
        orderNumber: orderNumberValue,
        name: nameValue,
        phone: document.getElementById("phone").value,
        people: document.getElementById("people").value,
        orderDate: document.getElementById("orderDate").value,
        total: document.getElementById("total").value,
        deposit: document.getElementById("deposit").value,
        balance: document.getElementById("balance").value,
        country: document.getElementById("country").value,
        request: document.getElementById("request").value,
        status: "booked"
    };

    updateUI();
    closeModal();
}

function setStatus(status){
    const date=selectedDate.value;
    if(bookings[date]?.[currentRoom]){
        bookings[date][currentRoom].status=status;
        updateUI();
        closeModal();
    }
}

function deleteBooking(){

    const date = document.getElementById("selectedDate").value;

    if(bookings[date] && bookings[date][currentRoom]){

        if(confirm("確定要取消此訂單嗎？")){

            delete bookings[date][currentRoom];

            updateUI();
            closeModal();
        }
    }
}

function updateUI(){
    const date = selectedDate.value;

    document.querySelectorAll(".room-card").forEach((card,i)=>{
        card.classList.remove("booked","checkedin","checkedout");

        const guestEl = card.querySelector(".guest-name");
        const subEl = card.querySelector(".sub-info");

        guestEl.innerText = "";
        subEl.innerText = "";

        const room = rooms[i];
        const data = bookings[date]?.[room];

        if(data){

            // ⭐ 防止 undefined
            const guestName = data.name ? data.name : "（未填姓名）";
            const orderNo = data.orderNumber ? data.orderNumber : "未填編號";

            card.classList.add(data.status || "booked");

            guestEl.innerText = guestName;

            let statusText="";
            if(data.status==="booked") statusText="🟡 已預訂";
            else if(data.status==="checkedin") statusText="🟢 已入住";
            else if(data.status==="checkedout") statusText="⚫ 已退房";
            else statusText="🟡 已預訂";

            subEl.innerText = "訂單編號："+orderNo+" ｜ "+statusText;
        }else{
    card.classList.remove("booked","checkedin","checkedout");
    card.querySelector(".guest-name").innerText = "空房";
    card.querySelector(".sub-info").innerText = "";
        }
    });
}

selectedDate.addEventListener("change",updateUI);
</script>

</body>
</html>
