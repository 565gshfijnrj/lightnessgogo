<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>房況管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; font-family: 'Noto Sans TC', sans-serif; }

body {
    margin: 0;
    background: linear-gradient(135deg,#667eea,#764ba2);
    padding: 30px;
}

.container {
    background: white;
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

.room-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-top: 20px;
}

.room-card {
    padding: 20px;
    border-radius: 15px;
    background: #f3f4f6;
    cursor: pointer;
    transition: 0.3s;
    min-height: 120px;
}

.room-card:hover { transform: translateY(-5px); }

.booked { background: #f6c453; color: white; }
.checkedin { background: #43e97b; color: white; }
.checkedout { background: #555; color: white; }
.checkout-today {
    background: #ff6b6b !important;
    color: white;
}
.stay-continue {
    background: #4dabf7 !important;
    color: white;
}

.room-number {
    font-size: 13px;
    opacity: 0.8;
}

.guest-name {
    font-size: 20px;
    font-weight: bold;
    margin-top: 5px;
}

.sub-info {
    font-size: 12px;
    margin-top: 5px;
}

.modal {
    display: none;
    position: fixed;
    top: 5%;
    left: 50%;
    transform: translateX(-50%);
    width: 450px;
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    max-height: 90vh;
    overflow-y: auto;
}

input, textarea {
    width: 100%;
    margin-bottom: 8px;
    padding: 6px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* 日期欄位縮短 */
input[type="date"]{
    width: 160px;
}

button {
    padding: 6px 12px;
    margin-right: 5px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

.rest-section{
    margin-top:40px;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.rest-form{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.rest-form textarea{
    grid-column:span 2;
}

.rest-form button{
    grid-column:span 2;
    background:#667eea;
    color:white;
    padding:10px;
}

.sectionTitle{
    margin-top:40px;
    font-size:22px;
    font-weight:bold;
}

#restCards{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    margin-top:15px;
}

.rest-card{
    background:#fff8e1;
    border-left:6px solid #ff9800;
    border-radius:10px;
    padding:15px;
    width:230px;
    box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

.rest-room{
    font-size:20px;
    font-weight:bold;
    color:#ff6f00;
    margin-bottom:8px;
}

.rest-card button{
    margin-top:8px;
    background:#e53935;
    border:none;
    color:white;
    padding:5px 10px;
    border-radius:6px;
    cursor:pointer;
}
.rest-section{
    margin:50px auto;
    width:700px;
    background:#ffffff;
    border-radius:12px;
    padding:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.rest-title{
    font-size:22px;
    font-weight:bold;
    text-align:center;
    margin-bottom:20px;
}

.rest-input{
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:12px;
}

.rest-input input,
.rest-input select{
    padding:8px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

.rest-input button{
    grid-column: span 3;
    padding:10px;
    background:#1976d2;
    color:white;
    border:none;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
}

.rest-input button:hover{
    background:#0d47a1;
}
#restCards{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    justify-content:center;
    margin-top:20px;
}

.rest-card{
    width:230px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.resting{
    background:#ffe0b2;
    border-left:6px solid #fb8c00;
}

.checkout{
    background:#eeeeee;
    border-left:6px solid #9e9e9e;
    color:#666;
    opacity:0.8;
}

.rest-room{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

.header{
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:20px;
}

.logo{
    width:50px;
    height:50px;
    object-fit:contain;
}

.hotel-name{
    font-size:26px;
    font-weight:bold;
    color:white;
}
</style>
</head>
<body>

<div class="header">
    <img src="logo.jpg" class="logo">
    <div class="hotel-name">來點子站前旅店</div>
</div>

<div class="container">

<div style="display:flex; justify-content:space-between; align-items:center;">
    <h2>🏨 住房資料</h2>
    <div id="statsBox" style="text-align:right; font-size:14px;"></div>
</div>
選擇日期：
<input type="date" id="selectedDate">

<div class="room-grid" id="roomGrid"></div>
</div>

<div id="restCardsArea">

<h2 class="sectionTitle">休息房況</h2>

<div id="restCards"></div>

</div>

<div class="rest-section">

<div class="rest-title">休息客登記</div>

<div class="rest-input">

<select id="restRoom">
<option value="">選擇房號</option>
<option>201</option>
<option>202</option>
<option>203</option>
<option>301</option>
<option>302</option>
<option>303</option>
<option>401</option>
<option>402</option>
<option>403</option>
</select>

<input id="restName" placeholder="顧客姓名">
<input id="restPhone" placeholder="電話">
<input id="restPeople" type="number" placeholder="人數" value="0" min="0">
<input id="restTime" placeholder="休息時間 (例:00:00~00:00)">
<input id="restPrice" type="number" placeholder="金額">

<input id="restID" placeholder="身分證">
<input id="restBirth" placeholder="出生年月日">
<input id="restNote" placeholder="備註">

<button onclick="addRest()">新增休息客</button>

</div>

</div>

<div class="modal" id="formModal">
<h3 id="modalTitle"></h3>

接單日期
<input id="orderDate" type="date"><br>

訂單編號
<input id="orderNumber"><br>

退房日期
<input id="checkoutDate" type="date"><br>

客人姓名
<input id="name"><br>

電話
<input id="phone"><br>

身分證
<input id="idNumber"><br>

出生年月日
<input type="date" id="birthday"><br>

入住人數
<input id="people" type="number"><br>

總金額
<input id="total" type="number"><br>

訂金
<input id="deposit" type="number"><br>

餘額
<input id="balance" type="number" readonly><br>

平台
<input id="platform"><br>

付款狀態
<select id="payStatus">
    <option value="">未付款</option>
    <option value="paid">已付清</option>
    <option value="platform">平台已收</option>
</select><br>

國家
<input id="country"><br>

需求
<textarea id="request"></textarea><br>

<br>
<button onclick="save()">儲存</button>
<button onclick="setStatus('checkedin')">入住</button>
<button onclick="setStatus('checkedout')">退房</button>
<button onclick="closeModal()">關閉</button>
<button onclick="deleteBooking()" style="background:#e74c3c;color:white;">
    取消訂單
</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCde1T_hHZOm7__3-1qcQ_NAeAbkz5MdFc",
    authDomain: "lightnessgogo-2d757.firebaseapp.com",
    projectId: "lightnessgogo-2d757",
    storageBucket: "lightnessgogo-2d757.firebasestorage.app",
    messagingSenderId: "1033105975068",
    appId: "1:1033105975068:web:915882758685a0d668bcd9",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
function getCurrentDate(){
    return document.getElementById("selectedDate").value
}
const rooms = ["201","202","203","301","302","303","401","402","403"];
let bookings = {};
let currentRoom = "";
let restData = {}
window.onload = async () => {
    const grid = document.getElementById("roomGrid");

    rooms.forEach(room=>{
        const card = document.createElement("div");
        card.className="room-card";
        card.innerHTML=`
            <div class="room-number">房號 ${room}</div>
            <div class="guest-name"></div>
            <div class="sub-info"></div>
        `;
        card.onclick=()=>openModal(room);
        grid.appendChild(card);
    });

    // 設定日期
    const selectedDate = document.getElementById("selectedDate");
    selectedDate.value = new Date().toISOString().split("T")[0];

    // 綁定 deposit 與 total 的監聽器
    const deposit = document.getElementById("deposit");
    const total = document.getElementById("total");
    deposit.addEventListener("input", calcBalance);
    total.addEventListener("input", calcBalance);

    // 讀 Firebase 資料
    await loadData();
    await loadRestData();
};
function calcBalance(){
    balance.value = (Number(total.value)||0)-(Number(deposit.value)||0);
}

function openModal(room){
    if(!selectedDate.value){ alert("請先選日期"); return; }

    currentRoom=room;
    modalTitle.innerText=room+" 房 - "+selectedDate.value;
    formModal.style.display="block";

    const data = bookings[selectedDate.value]?.[room];
    if(data){
        orderNumber.value=data.orderNumber;
        name.value=data.name;
        phone.value=data.phone;
        people.value=data.people;
        idNumber.value=data.idNumber;
        birthday.value=data.birthday;
        orderDate.value=data.orderDate;
        total.value=data.total;
        deposit.value=data.deposit;
        balance.value=data.balance;
        country.value=data.country;
        platform.value=data.platform;
        request.value=data.request;
        payStatus.value = data.payStatus || "";
    }else{
        document.querySelectorAll("#formModal input, #formModal textarea")
        .forEach(i=>i.value="");
    }
}

window.closeModal = function(){
    formModal.style.display="none";
}

window.save = async function(){

    const checkin = document.getElementById("selectedDate").value;
    const checkout = document.getElementById("checkoutDate").value;

    if(!checkin || !checkout){
        alert("請選擇入住與退房日期");
        return;
    }

    let current = new Date(checkin);
    const end = new Date(checkout);

    let dayIndex = 0;

    while(current < end){

        const date = current.toISOString().split("T")[0];

        if(!bookings[date]) bookings[date] = {};

        const oldData = bookings[date]?.[currentRoom] || {};

        let status = dayIndex === 0 ? "booked" : "stay";

        bookings[date][currentRoom] = {
            ...oldData,

            orderNumber: document.getElementById("orderNumber").value.trim(),
            name: document.getElementById("name").value.trim(),
            phone: document.getElementById("phone").value,
            idNumber: document.getElementById("idNumber").value,
            birthday: document.getElementById("birthday").value,
            people: document.getElementById("people").value,
            total: document.getElementById("total").value,
            deposit: document.getElementById("deposit").value,
            balance: document.getElementById("balance").value,
            country: document.getElementById("country").value,
            platform: document.getElementById("platform").value,
            request: document.getElementById("request").value,
            payStatus: document.getElementById("payStatus").value,

            status: oldData.status || status,
            everCheckedIn: oldData.everCheckedIn || false,

            checkinDate: checkin,
            checkoutDate: checkout
        };

        await setDoc(doc(db, "bookings", date), bookings[date]);

        current.setDate(current.getDate() + 1);
        dayIndex++;
    }

    updateUI();
    closeModal();
}
window.setStatus = async function(status){

    const date = document.getElementById("selectedDate").value;
    const data = bookings[date]?.[currentRoom];

    if(!data) return;

    const checkin = new Date(data.checkinDate);
    const checkout = new Date(data.checkoutDate);

    let current = new Date(checkin);

    while(current < checkout){

        const d = current.toISOString().split("T")[0];

        if(bookings[d]?.[currentRoom]){

            bookings[d][currentRoom].status = status;

            if(status === "checkedin" || status === "checkedout"){
                bookings[d][currentRoom].everCheckedIn = true;
            }

            await setDoc(doc(db, "bookings", d), bookings[d]);
        }

        current.setDate(current.getDate() + 1);
    }

    updateUI();
    closeModal();
}

window.deleteBooking = async function(){

    const date = document.getElementById("selectedDate").value;
    const data = bookings[date]?.[currentRoom];

    if(!data) return;

    if(confirm("確定要取消此訂單嗎？")){

        let current = new Date(data.checkinDate);
        const end = new Date(data.checkoutDate);

        while(current < end){

            const d = current.toISOString().split("T")[0];

            if(bookings[d]){
                delete bookings[d][currentRoom];
                await setDoc(doc(db, "bookings", d), bookings[d]);
            }

            current.setDate(current.getDate() + 1);
        }

        updateUI();
        closeModal();
    }
}

function updateUI(){
    const date = selectedDate.value;

    document.querySelectorAll(".room-card").forEach((card,i)=>{
        card.classList.remove("booked","checkedin","checkedout");

        const guestEl = card.querySelector(".guest-name");
        const subEl = card.querySelector(".sub-info");

        guestEl.innerText = "";
        subEl.innerText = "";

        const room = rooms[i];
        const data = bookings[date]?.[room];

        let nightText = "";
        let stayType = "";

if(data && data.checkinDate && data.checkoutDate){

    const checkin = new Date(data.checkinDate);
    const checkout = new Date(data.checkoutDate);
    const today = new Date(date);

    const diffDays = Math.floor((today - checkin) / (1000*60*60*24)) + 1;
    const totalDays = Math.floor((checkout - checkin) / (1000*60*60*24));

    nightText = `第${diffDays}晚 / 共${totalDays}晚`;

    if(diffDays === 1){
        stayType = "🆕 首日入住";
    }
    else if(diffDays === totalDays){
        stayType = "⚠️ 今日退房";
    }
    else{
        stayType = "🔵 續住中";
    }
}

        if(data){

            // ⭐ 防止 undefined
            const guestName = data.name ? data.name : "（未填姓名）";
            const orderNo = data.orderNumber ? data.orderNumber : "未填編號";
            
            // ⭐ 每次先清空所有顏色（超重要）

            card.className = "room-card";

            if(data){

                switch(data.status){
                    case "booked":
                    card.classList.add("booked");
                    break;

                    case "checkedin":
                    card.classList.add("checkedin");
                    break;

                    case "checkedout":
                    card.classList.add("checkedout");
                    break;

                    case "stay":
                    card.classList.add("stay-continue");
                    break;

                    default:
                    card.classList.add("booked");
                }
            }

            guestEl.innerText = guestName;

            let statusText="";
            if(data.status==="booked") statusText="🟡 已預訂";
            else if(data.status==="checkedin") statusText="🟢 已入住";
            else if(data.status==="checkedout") statusText="⚫ 已退房";
            else statusText="🟡 已預訂";

            let payText = "";
            if(data.payStatus === "paid"){
                payText = "💰 已付清";
            }
            else if(data.payStatus === "platform"){
                payText = "🏦 平台已收";
            }
            else{
                payText = data.balance == 0 ? "💰 已收款" : "💵 未收款";
            }
            const platformText = data.platform ? data.platform : "未填平台";

            subEl.innerText =
            "訂單編號："+orderNo+
            " ｜ "+platformText+
            " ｜ "+payText+
            " ｜ "+statusText+
            (nightText ? " ｜ "+nightText : "")+
            (stayType ? " ｜ "+stayType : "");
        }else{
    card.classList.remove("booked","checkedin","checkedout");
    card.querySelector(".guest-name").innerText = "空房";
    card.querySelector(".sub-info").innerText = "";
        }
    });

    updateStats();
}

document.getElementById("selectedDate").addEventListener("change", async () => {
    await loadData();      // 讀住房資料
    await loadRestData();  // 讀休息資料
});

window.addRest = async function(){
    let date = getCurrentDate()
    if(!date){
        alert("請先選擇日期")
        return;
    }
    
    let room = document.getElementById("restRoom").value
    let name = document.getElementById("restName").value
    let phone = document.getElementById("restPhone").value
    let time = document.getElementById("restTime").value
    let price = Number(document.getElementById("restPrice").value) || 0;
    let restPeople = Number(document.getElementById("restPeople").value) || 1;

    if(name=="" || room==""){
        alert("請填寫房號與姓名")
        return;
    }

    

    let rest = {
        room:room,
        name:name,
        phone:phone,
        people: restPeople,
        time:time,
        price:price,
        id:document.getElementById("restID").value,
        birth:document.getElementById("restBirth").value,
        note:document.getElementById("restNote").value,
        status:"resting"
    }

    if(!restData[date]){
        restData[date]=[];
    }

    restData[date].push(rest);
    // ⭐ 存到 Firebase
     try {
        await setDoc(doc(db, "restData", date), { data: restData[date] });
    } catch(e) {
        console.error("存休息房資料失敗", e);
        alert("Firebase 存檔失敗，請檢查控制台");
    }
    renderRest();

    // 清空輸入欄位
    document.getElementById("restRoom").value=""
    document.getElementById("restName").value=""
    document.getElementById("restPhone").value=""
    document.getElementById("restPeople").value = 0;
    document.getElementById("restTime").value=""
    document.getElementById("restPrice").value=""
    document.getElementById("restID").value=""
    document.getElementById("restBirth").value=""
    document.getElementById("restNote").value=""
}
function renderRest(){
    let date = getCurrentDate();
    let area = document.getElementById("restCards");
    area.innerHTML = "";

    if(!restData[date]) return;

    restData[date].forEach((r, i) => {
        let color = r.status=="resting" ? "resting" : "checkout";

        let cardDiv = document.createElement("div");
        cardDiv.className = `rest-card ${color}`;

        cardDiv.innerHTML = `
            <div class="rest-room">房號 ${r.room}</div>
            姓名: ${r.name}<br>
            電話: ${r.phone}<br>
            人數: ${r.people}<br>
            身分證: ${r.id}<br>
            生日: ${r.birth}<br>
            休息: ${r.time}<br>
            金額: ${r.price}<br>
            備註: ${r.note}<br>
        `;

        let checkoutBtn = document.createElement("button");
        checkoutBtn.textContent = "結束休息";
        checkoutBtn.addEventListener("click", () => checkoutRest(i));

        let deleteBtn = document.createElement("button");
        deleteBtn.textContent = "刪除資料";
        deleteBtn.addEventListener("click", () => deleteRest(i));

        cardDiv.appendChild(checkoutBtn);
        cardDiv.appendChild(deleteBtn);

        area.appendChild(cardDiv);
    });
}

async function checkoutRest(index){

    let date = getCurrentDate()

    restData[date][index].status="checkout"
    // 更新 Firebase
        await setDoc(doc(db, "restData", date), { data: restData[date] || [] });
        renderRest()
}
async function deleteRest(index){

    let date = getCurrentDate()

    if(confirm("確定要刪除這筆休息資料嗎？")){

        restData[date].splice(index,1)
        // 更新 Firebase
        await setDoc(doc(db, "restData", date), { data: restData[date] || [] });
        renderRest()

    }
}

async function loadData() {
  const date = document.getElementById("selectedDate").value; // ✅ 提到外面

  try {
    const docRef = doc(db, "bookings", date);
    const docSnap = await getDoc(docRef);
    bookings[date] = docSnap.exists() ? docSnap.data() : {};
  } catch(e) {
    console.error("載入入住資料失敗", e);
    bookings[date] = {}; // ✅ 不會爆了
  }

  updateUI();
}

async function loadRestData() {
  try {
    const date = selectedDate.value;
    const docRef = doc(db, "restData", date);
    const docSnap = await getDoc(docRef);
    restData[date] = docSnap.exists() ? docSnap.data().data || [] : [];
  } catch(e) {
    console.error("載入休息資料失敗", e);
    restData[date] = [];
  }
  renderRest();
}

function updateStats(){
    const date = selectedDate.value;
    const statsBox = document.getElementById("statsBox");

    if(!date || !bookings[date]){
        statsBox.innerHTML = "今日入住：0 人";
        return;
    }

    let totalPeople = 0;
    let countryStats = {};

    Object.values(bookings[date]).forEach(data => {
        // ⭐ 只要曾經入住過的人都算
        if(data.everCheckedIn){

            let people = Number(data.people) || 1;
            totalPeople += people;

            // 國家判斷（空的 = 台灣）
            let country = data.country && data.country.trim() !== "" 
                ? data.country 
                : "台灣";

            if(!countryStats[country]) countryStats[country] = 0;

            countryStats[country] += people;
        }
    });

    let html = `<b>入住總人數：${totalPeople} 人</b><br>`;
    for(let c in countryStats){
        html += `${c}：${countryStats[c]} 人<br>`;
    }

    statsBox.innerHTML = html;
}

</script>
</body>
</html>
